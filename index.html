<index class="html"></index><<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calculadora de Triángulos</title>

<style>
body{
  font-family: Arial;
  background: linear-gradient(135deg, #0f0f0f, #1a0000);
  text-align:center;
  color:red;
}

.container{
  background:#111;
  width:360px;
  margin:30px auto;
  padding:20px;
  border-radius:15px;
  box-shadow:0 0 20px red;
}

.nombre{
  font-size:20px;
  font-weight:bold;
  margin-bottom:10px;
  text-shadow:0 0 10px red;
}

.logo{
  width:80px;
  margin:10px 0;
}

.imagen{
  width:100%;
  border-radius:10px;
  margin:10px 0;
  box-shadow:0 0 15px red;
}

input{
  margin:5px;
  padding:8px;
  width:100px;
  background:black;
  color:red;
  border:1px solid red;
  border-radius:5px;
  text-align:center;
}

button{
  margin:10px;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
  background:black;
  color:red;
  border:1px solid red;
  box-shadow:0 0 10px red;
}

button:hover{
  background:red;
  color:black;
}

#resultado{
  margin-top:15px;
  text-align:left;
  color:#ff4d4d;
}

canvas{
  margin-top:20px;
  border:1px solid red;
  box-shadow:0 0 10px red;
}
</style>

</head>
<body>

<div class="container">

<div class="nombre">David Martinez</div>

<!-- IMAGEN QUE SÍ FUNCIONA -->
<img class="imagen" src="https://upload.wikimedia.org/wikipedia/commons/2/2e/Futbol_soccer_ball.svg">

<!-- LOGO -->
<img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/7/7f/TolucaFC.png">

<h2>Calculadora de Triángulos</h2>

<h4>Lados</h4>
<input id="a" placeholder="Lado a">
<input id="b" placeholder="Lado b">
<input id="c" placeholder="Lado c">

<h4>Ángulos (°)</h4>
<input id="A" placeholder="Ángulo A">
<input id="B" placeholder="Ángulo B">
<input id="C" placeholder="Ángulo C">

<br>
<button onclick="calcular()">Calcular</button>
<button onclick="resetear()">Restablecer</button>

<div id="resultado"></div>

<canvas id="triangulo" width="300" height="200"></canvas>

</div>

<script>

function degToRad(x){ return x*Math.PI/180; }
function radToDeg(x){ return x*180/Math.PI; }

function calcular(){

let a = parseFloat(document.getElementById("a").value);
let b = parseFloat(document.getElementById("b").value);
let c = parseFloat(document.getElementById("c").value);
let A = parseFloat(document.getElementById("A").value);
let B = parseFloat(document.getElementById("B").value);
let C = parseFloat(document.getElementById("C").value);

let datos = [a,b,c,A,B,C].filter(x=>!isNaN(x)).length;

if(datos !== 3){
  mostrar("❌ Debes ingresar exactamente 3 datos");
  return;
}

if(!a && !b && !c){
  mostrar("❌ Debe haber al menos un lado");
  return;
}

try{

if(A && B && a){
  C = 180 - A - B;
  b = a*Math.sin(degToRad(B))/Math.sin(degToRad(A));
  c = a*Math.sin(degToRad(C))/Math.sin(degToRad(A));
}

else if(A && C && a){
  B = 180 - A - C;
  b = a*Math.sin(degToRad(B))/Math.sin(degToRad(A));
  c = a*Math.sin(degToRad(C))/Math.sin(degToRad(A));
}

else if(B && C && b){
  A = 180 - B - C;
  a = b*Math.sin(degToRad(A))/Math.sin(degToRad(B));
  c = b*Math.sin(degToRad(C))/Math.sin(degToRad(B));
}

else if(a && b && C){
  c = Math.sqrt(a*a + b*b - 2*a*b*Math.cos(degToRad(C)));
  A = radToDeg(Math.acos((b*b + c*c - a*a)/(2*b*c)));
  B = 180 - A - C;
}

else if(a && c && B){
  b = Math.sqrt(a*a + c*c - 2*a*c*Math.cos(degToRad(B)));
  A = radToDeg(Math.acos((b*b + c*c - a*a)/(2*b*c)));
  C = 180 - A - B;
}

else if(b && c && A){
  a = Math.sqrt(b*b + c*c - 2*b*c*Math.cos(degToRad(A)));
  B = radToDeg(Math.acos((a*a + c*c - b*b)/(2*a*c)));
  C = 180 - A - B;
}

else if(a && b && A){
  let senB = b*Math.sin(degToRad(A))/a;

  if(senB > 1){
    mostrar("❌ No existe triángulo");
    return;
  }

  let B1 = radToDeg(Math.asin(senB));
  let B2 = 180 - B1;

  let C1 = 180 - A - B1;
  let C2 = 180 - A - B2;

  let c1 = a*Math.sin(degToRad(C1))/Math.sin(degToRad(A));
  let c2 = a*Math.sin(degToRad(C2))/Math.sin(degToRad(A));

  mostrar(`
  ✔ Solución 1:<br>
  a=${a}, b=${b}, c=${c1.toFixed(2)}<br>
  A=${A}°, B=${B1.toFixed(2)}°, C=${C1.toFixed(2)}°<br><br>

  ✔ Solución 2:<br>
  a=${a}, b=${b}, c=${c2.toFixed(2)}<br>
  A=${A}°, B=${B2.toFixed(2)}°, C=${C2.toFixed(2)}°
  `);

  dibujar(a,b,c1);
  return;
}

else{
  mostrar("❌ Combinación no válida");
  return;
}

mostrar(`
✔ Resultado:<br><br>
a=${a.toFixed(2)}<br>
b=${b.toFixed(2)}<br>
c=${c.toFixed(2)}<br><br>
A=${A.toFixed(2)}°<br>
B=${B.toFixed(2)}°<br>
C=${C.toFixed(2)}°
`);

dibujar(a,b,c);

}catch{
  mostrar("❌ Error en cálculo");
}

}

function dibujar(a,b,c){
let canvas = document.getElementById("triangulo");
let ctx = canvas.getContext("2d");

ctx.clearRect(0,0,300,200);

let scale = 100/Math.max(a,b,c);
a*=scale; b*=scale; c*=scale;

let x1=50, y1=150;
let x2=50+c, y2=150;

let x3 = 50 + (b*b + c*c - a*a)/(2*c);
let y3 = 150 - Math.sqrt(Math.max(0,b*b - (x3-50)*(x3-50)));

ctx.beginPath();
ctx.moveTo(x1,y1);
ctx.lineTo(x2,y2);
ctx.lineTo(x3,y3);
ctx.closePath();
ctx.strokeStyle="red";
ctx.stroke();
}

function mostrar(msg){
document.getElementById("resultado").innerHTML = msg;
}

function resetear(){
document.querySelectorAll("input").forEach(i=>i.value="");
document.getElementById("resultado").innerHTML="";
let ctx = document.getElementById("triangulo").getContext("2d");
ctx.clearRect(0,0,300,200);
}

</script>

</body>
</html>
